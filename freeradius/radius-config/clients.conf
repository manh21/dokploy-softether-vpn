# FreeRADIUS Clients Configuration
# Defines which devices/NAS can talk to this RADIUS server.
# Mount at: /etc/raddb/clients.conf

# SoftEtherVPN container — the VPN server acts as the NAS
client softether {
    ipaddr          = softether-vpn
    secret          = testing123
    shortname       = softether
    nas_type        = other
}

# VPN clients subnet — allows the local bridge/VPN subnet to proxy auth
client vpn-subnet {
    ipaddr          = 10.99.0.0/24
    secret          = testing123
    shortname       = vpn-clients
    nas_type        = other
}

# GenieACS — for TR-069 CPE device authentication (future)
client genieacs {
    ipaddr          = genieacs
    secret          = testing123
    shortname       = genieacs
    nas_type        = other
}

# Local testing from inside the container
client localhost {
    ipaddr          = 127.0.0.1
    secret          = testing123
}
